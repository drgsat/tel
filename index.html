<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>

<!-- استدعاء مكتبة تليجرام -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #222;
    color: white;
    margin-top: 60px;
}
button {
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background-color: #2481cc; /* لون متناسق مع ثيم تليجرام */
    color: white;
}
button:hover {
    background-color: #1c66a2;
}
</style>

</head>

<body>

<h1>أهلاً بك</h1>

<p id="name">جاري التحميل...</p>

<button onclick="hello()">اضغط هنا</button>

<script>
// تعريف متغير تليجرام
let tg = window.Telegram.WebApp;

// توسيع التطبيق لملء الشاشة
tg.expand();

// التحقق من وجود بيانات المستخدم بشكل آمن
let firstName = "يا صديقي"; // الاسم الافتراضي في حال عدم توفر البيانات

if (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name) {
    firstName = tg.initDataUnsafe.user.first_name;
}

// عرض رسالة الترحيب في الصفحة
document.getElementById("name").innerHTML = "مرحباً " + firstName;

// دالة التنبيه عند الضغط على الزر
function hello(){
    // يفضل استخدام تنبيه تليجرام المدمج بدلاً من alert العادية ليتناسق مع التصميم
    if (tg.showAlert) {
        tg.showAlert("أهلاً " + firstName);
    } else {
        alert("أهلاً " + firstName);
    }
}
</script>

</body>
</html>
