<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق تليجرام المصغر</title>

<!-- استدعاء مكتبة تليجرام -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- استدعاء خط عربي احترافي -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
    /* الإعدادات الأساسية والخلفية الجذابة */
    body {
        font-family: 'Cairo', sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* تدرج لوني فخم */
        color: white;
        overflow: hidden;
    }

    /* الحاوية الرئيسية (تأثير الزجاج الشفاف) */
    .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        padding: 40px 30px;
        text-align: center;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        width: 80%;
        max-width: 350px;
        /* إخفاء البطاقة افتراضياً حتى نتأكد من تليجرام */
        display: none; 
        flex-direction: column;
        gap: 20px;
    }

    /* العناوين والنصوص */
    h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    p {
        margin: 0;
        font-size: 18px;
        color: #e0e0e0;
    }

    #user-name {
        font-weight: 700;
        color: #4facfe; /* لون أزرق سماوي مميز للاسم */
        font-size: 22px;
    }

    /* تصميم الزر */
    button {
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        color: white;
        border: none;
        padding: 12px 25px;
        font-size: 18px;
        font-weight: 700;
        font-family: 'Cairo', sans-serif;
        border-radius: 50px;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
    }

    button:active {
        transform: translateY(1px);
    }
</style>
</head>
<body>

    <!-- الواجهة التي ستظهر فقط داخل تليجرام -->
    <div class="card" id="app-card">
        <h1>أهلاً وسهلاً</h1>
        <p>أسعدنا تواجدك،</p>
        <div id="user-name">جاري التحميل...</div>
        <button onclick="sayHello()">اضغط هنا للترحيب</button>
    </div>

<script>
    let tg = window.Telegram.WebApp;

    // الشرط الأساسي: إذا لم يكن الرابط مفتوحاً من تليجرام
    // tg.platform تكون "unknown" إذا كان متصفحاً عادياً
    if (tg.platform === "unknown" || Object.keys(tg.initDataUnsafe).length === 0) {
        
        // إفراغ الصفحة تماماً وجعلها لا تتجاوب (شاشة صامتة)
        document.body.innerHTML = "";
        document.body.style.background = "#000"; // خلفية سوداء للإيهام بأن الرابط لا يعمل
        
    } else {
        
        // إذا كان مفتوحاً من تليجرام، نظهر الواجهة ونشغل التطبيق
        tg.ready();
        tg.expand();
        
        // إظهار بطاقة التطبيق
        document.getElementById("app-card").style.display = "flex";

        // جلب اسم المستخدم
        let firstName = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "يا صديقي";
        
        // عرض الاسم في الواجهة
        document.getElementById("user-name").innerText = firstName;
        
        // دالة الزر
        window.sayHello = function() {
            if (tg.showAlert) {
                tg.showAlert("يا هلا فيك " + firstName + "، نورت التطبيق!");
            } else {
                alert("يا هلا فيك " + firstName + "، نورت التطبيق!");
            }
        };
    }
</script>

</body>
</html>
